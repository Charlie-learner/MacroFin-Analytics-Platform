<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hive Big Data Query Console</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        /* 页面整体样式：使用干净现代的浅灰色背景 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 30px;
            color: #343a40;
        }
        /* 顶部标题栏样式 */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            color: #2c3e50;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .header p {
            color: #6c757d;
            font-size: 1.1em;
        }

        /* 查询按钮面板样式 */
        .query-panel {
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            text-align: center;
        }
        .query-panel h3 {
            margin-top: 0;
            color: #495057;
            margin-bottom: 20px;
        }
        /* 按钮的炫酷交互样式：鼠标悬浮会微微上浮并加深阴影 */
        .btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 24px;
            margin: 8px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(52, 152, 219, 0.3);
        }
        .btn:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(52, 152, 219, 0.4);
        }
        .btn:active {
            transform: translateY(0);
        }

        /* 结果展示区（舞台）样式 */
        .result-stage {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            min-height: 500px;
        }
        /* 当前查询的标题显示框 */
        .query-title-display {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 1.5em;
            font-weight: bold;
            min-height: 36px;
        }
        /* ECharts 图表挂载点 */
        #mainChart {
            width: 100%;
            height: 500px;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>📱 Big Data Analysis Console</h1>
    <p>Powered by Hadoop, Hive & Spring Boot</p>
</div>

<div class="query-panel">
    <h3>Execute Analytical Queries</h3>
    <button class="btn" onclick="runQuery('device')">Query 1: Device Preferences</button>
    <button class="btn" onclick="runQuery('occupation')">Query 2: Occupation vs. Stress</button>
    <button class="btn" onclick="runQuery('social')">Query 3: Social Media Impact</button>
    <button class="btn" onclick="runQuery('caffeine')">Query 4: Caffeine vs. Sleep</button>
</div>

<div class="result-stage">
    <div id="currentQueryTitle" class="query-title-display">Please click a query button above to execute analysis...</div>

    <div id="mainChart"></div>
</div>

<script>
    // 1. 初始化唯一的一个 ECharts 实例
    var myChart = echarts.init(document.getElementById('mainChart'));

    // 监听浏览器窗口大小变化，让图表自动缩放适配（响应式）
    window.addEventListener('resize', function() {
        myChart.resize();
    });

    // 2. 核心函数：当用户点击某个查询按钮时触发
    function runQuery(queryType) {

        // 先清空上一个图表，并显示“加载中”动画（模拟大数据查询的时间差，非常逼真！）
        myChart.clear();
        myChart.showLoading({
            text: 'Executing Hive Query...',
            color: '#3498db',
            textColor: '#2c3e50',
            maskColor: 'rgba(255, 255, 255, 0.8)',
            zlevel: 0
        });

        // 定义变量：记录要请求的后端接口地址 和 要展示的图表英文标题
        let apiUrl = '';
        let displayTitle = '';

        // 根据传入的参数判断用户点的是哪个按钮，从而匹配对应的接口
        if (queryType === 'device') {
            apiUrl = 'http://localhost:8080/api/analysis/device-usage';
            displayTitle = 'Query Result: iOS vs Android User Distribution';
        } else if (queryType === 'occupation') {
            apiUrl = 'http://localhost:8080/api/analysis/occupation-stress';
            displayTitle = 'Query Result: Average Stress Level by Occupation';
        } else if (queryType === 'social') {
            apiUrl = 'http://localhost:8080/api/analysis/social-productivity';
            displayTitle = 'Query Result: Social Media Hours vs Productivity Score';
        } else if (queryType === 'caffeine') {
            apiUrl = 'http://localhost:8080/api/analysis/caffeine-sleep';
            displayTitle = 'Query Result: Caffeine Intake Effect on Sleep & Stress';
        }

        // 更新页面上的标题文字
        document.getElementById('currentQueryTitle').innerText = displayTitle;

        // 3. 使用 Fetch API 向 Spring Boot 后端发送真实的请求
        fetch(apiUrl)
            .then(response => response.json()) // 将后端返回的数据转化为 JSON
            .then(data => {
                // 数据拿到了！隐藏“加载中”动画
                myChart.hideLoading();

                // 调用下面的辅助函数，根据数据生成对应图表的配置项
                let option = buildChartOption(queryType, data);

                // 正式渲染图表！
                myChart.setOption(option);
            })
            .catch(error => {
                // 如果后端没开或者报错了，在这里处理异常
                myChart.hideLoading();
                document.getElementById('currentQueryTitle').innerText = '❌ Error executing query. Is Spring Boot running?';
                console.error('API Error:', error);
            });
    }

    // 4. 辅助函数：根据查询的类别，把冰冷的数据组装成 ECharts 需要的炫酷配置项
    function buildChartOption(type, data) {
        let option = {};

        if (type === 'device') {
            // 饼图：展示苹果和安卓设备的比例
            option = {
                tooltip: { trigger: 'item', formatter: '{b}: {c} Users ({d}%)' },
                legend: { bottom: '5%', left: 'center' },
                series: [{
                    type: 'pie',
                    radius: '60%',
                    data: data.map(item => ({ name: item.device_type, value: item.user_count })),
                    emphasis: { itemStyle: { shadowBlur: 10, shadowOffsetX: 0, shadowColor: 'rgba(0, 0, 0, 0.5)' } }
                }]
            };
        }
        else if (type === 'occupation') {
            // 柱状图：展示不同职业的压力水平
            option = {
                tooltip: { trigger: 'axis' },
                xAxis: { type: 'category', data: data.map(item => item.occupation), axisLabel: { interval: 0, rotate: 25 } },
                yAxis: { type: 'value', name: 'Avg Stress Score' },
                series: [{
                    type: 'bar',
                    data: data.map(item => item.avg_stress),
                    itemStyle: { color: '#e74c3c' },
                    barWidth: '50%'
                }]
            };
        }
        else if (type === 'social') {
            // 折线图：展示社交媒体使用时长与工作效率的关系
            option = {
                tooltip: { trigger: 'axis' },
                xAxis: { type: 'category', data: data.map(item => item.social_hours_bracket + ' Hours'), name: 'Daily Social Media' },
                yAxis: { type: 'value', name: 'Productivity Score' },
                series: [{
                    type: 'line',
                    smooth: true,
                    data: data.map(item => item.avg_productivity),
                    lineStyle: { width: 4, color: '#2ecc71' },
                    areaStyle: { color: 'rgba(46, 204, 113, 0.2)' }
                }]
            };
        }
        else if (type === 'caffeine') {
            // 双Y轴混合图表：同时展示咖啡因对睡眠（柱形）和压力（折线）的影响
            option = {
                tooltip: { trigger: 'axis' },
                legend: { data: ['Sleep Hours', 'Stress Level'] },
                xAxis: { type: 'category', data: data.map(item => item.caffeine_intake_cups + ' Cups') },
                yAxis: [
                    { type: 'value', name: 'Sleep (Hours)', position: 'left' },
                    { type: 'value', name: 'Stress (Score)', position: 'right' }
                ],
                series: [
                    { name: 'Sleep Hours', type: 'bar', data: data.map(item => item.avg_sleep_hours), itemStyle: { color: '#3498db' } },
                    { name: 'Stress Level', type: 'line', yAxisIndex: 1, data: data.map(item => item.avg_stress_level), smooth: true, lineStyle: { width: 3, color: '#f1c40f' } }
                ]
            };
        }
        return option;
    }
</script>
</body>
</html>
