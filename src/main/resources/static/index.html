<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacroFin Big Data Analytics Platform</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        /* 页面整体背景，采用金融科技风的浅灰蓝底色 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 30px;
            color: #2c3e50;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            color: #1a252f;
            font-size: 2.8em;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        .header p {
            color: #7f8c8d;
            font-size: 1.2em;
        }

        /* 控制面板样式 */
        .query-panel {
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            text-align: center;
        }
        .query-panel h3 {
            margin-top: 0;
            color: #34495e;
            margin-bottom: 20px;
        }
        /* 金融深蓝色系按钮 */
        .btn {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 12px 24px;
            margin: 8px;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(44, 62, 80, 0.3);
        }
        .btn:hover {
            background-color: #34495e;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(44, 62, 80, 0.4);
        }
        .btn:active {
            transform: translateY(0);
        }

        /* 可视化图表舞台 */
        .result-stage {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            min-height: 550px;
        }
        .query-title-display {
            text-align: center;
            color: #2980b9;
            margin-bottom: 20px;
            font-size: 1.6em;
            font-weight: bold;
            min-height: 36px;
        }
        #mainChart {
            width: 100%;
            height: 500px;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>📊 MacroFin Analytics Platform</h1>
    <p>Big Data Financial Insights powered by Hadoop & Hive</p>
</div>

<div class="query-panel">
    <h3>Execute Macro-Financial Queries</h3>
    <button class="btn" onclick="runQuery('stock')">1. Market Activity (Volume)</button>
    <button class="btn" onclick="runQuery('macro')">2. GDP vs Unemployment</button>
    <button class="btn" onclick="runQuery('confidence')">3. Consumer Confidence Impact</button>
    <button class="btn" onclick="runQuery('commodity')">4. Oil & Gold Trend Analysis</button>
    <button class="btn" onclick="runQuery('interestgdp')">5. Interest Rate vs GDP Growth</button>
    <button class="btn" onclick="runQuery('phillips')">6. Phillips Curve (Inflation vs Unemployment)</button>
    <button class="btn" onclick="runQuery('performance')">7. Stock Index Performance (Annual % Change)</button>
    <button class="btn" onclick="runQuery('mainvestment')">8. M&A and Investment Trends</button>
    <button class="btn" onclick="runQuery('realestate')">9. Real Estate & Interest Rate Analysis</button>
    <button class="btn" onclick="runQuery('oilinflation')">10. Oil Price & Inflation Correlation</button>



</div>

<div class="result-stage">
    <div id="currentQueryTitle" class="query-title-display">Awaiting Query Execution...</div>
    <div id="mainChart"></div>
</div>

<script>
    // 初始化 ECharts
    var myChart = echarts.init(document.getElementById('mainChart'));

    window.addEventListener('resize', function() {
        myChart.resize();
    });

    // 核心请求逻辑
    function runQuery(queryType) {
        myChart.clear();
        // 显示高大上的加载动画
        myChart.showLoading({
            text: 'Executing Distributed MapReduce Query in Hive...',
            color: '#2980b9',
            textColor: '#2c3e50',
            maskColor: 'rgba(255, 255, 255, 0.8)',
            zlevel: 0
        });

        let apiUrl = '';
        let displayTitle = '';

        // 路由到对应的金融接口
        if (queryType === 'stock') {
            apiUrl = 'http://localhost:8080/api/finance/stock-volume';
            displayTitle = 'Global Market Activity: Trading Volume by Index';
        } else if (queryType === 'macro') {
            apiUrl = 'http://localhost:8080/api/finance/economic-trends';
            displayTitle = 'Macro Trends: Annual GDP Growth vs Unemployment Rate';
        } else if (queryType === 'confidence') {
            apiUrl = 'http://localhost:8080/api/finance/confidence-spending';
            displayTitle = 'Consumer Behavior: Confidence Index vs Consumer Spending';
        } else if (queryType === 'commodity') {
            apiUrl = 'http://localhost:8080/api/finance/commodities-trend';
            displayTitle = 'Commodity Markets: Historical Crude Oil vs Gold Prices';
        } else if (queryType === 'interestgdp') {
            apiUrl = 'http://localhost:8080/api/finance/interest-gdp-correlation';
            displayTitle = 'Monetary Policy Analysis: Interest Rate Impact on GDP Growth';
        } else if (queryType === 'phillips') {
            apiUrl = 'http://localhost:8080/api/finance/phillips-curve';
            displayTitle = 'Phillips Curve Analysis: Inflation Rate vs Unemployment Rate';
        } else if (queryType === 'performance') {
            apiUrl = 'http://localhost:8080/api/finance/stock-performance';
            displayTitle = '三大股指年度涨跌幅对比：开盘价与收盘价变化率';
        } else if (queryType === 'mainvestment') {
            apiUrl = 'http://localhost:8080/api/finance/ma-investment-trend';
            displayTitle = '企业并购与投资趋势分析：MA 交易、风投基金与破产率';
        } else if (queryType === 'realestate') {
            apiUrl = 'http://localhost:8080/api/finance/real-estate-interest';
            displayTitle = 'Real Estate Market Analysis: Property Index vs Interest Rate';
        } else if (queryType === 'oilinflation') {
            apiUrl = 'http://localhost:8080/api/finance/oil-inflation-correlation';
            displayTitle = 'Energy Economics Analysis: Crude Oil Price Impact on Inflation Rate';
        } else if (queryType === 'funnel') {
            apiUrl = 'http://localhost:8080/api/finance/investment-funnel';
            displayTitle = 'Investment Funnel: M&A Deal Conversion Process';
        } else if (queryType === 'radar') {
            apiUrl = 'http://localhost:8080/api/finance/economic-health-radar';
            displayTitle = 'Economic Health Radar: Multi-Dimensional Annual Assessment';
        }

        document.getElementById('currentQueryTitle').innerText = displayTitle;

        // 发起 Fetch 请求
        fetch(apiUrl)
            .then(response => response.json())
            .then(data => {
                myChart.hideLoading();
                let option = buildChartOption(queryType, data);
                myChart.setOption(option);
            })
            .catch(error => {
                myChart.hideLoading();
                document.getElementById('currentQueryTitle').innerText = '❌ Error executing query. Is Spring Boot Backend running?';
                console.error('API Error:', error);
            });
    }
    //渐变色
    function getColorByIndex(index) {
        const colors = [
            { start: '#3498db', end: '#2980b9' },
            { start: '#2ecc71', end: '#27ae60' },
            { start: '#e74c3c', end: '#c0392b' },
            { start: '#f39c12', end: '#e67e22' },
            { start: '#9b59b6', end: '#8e44ad' }
        ];
        return colors[index % colors.length];
    }


    // 构建 ECharts 金融风格图表
    function buildChartOption(type, data) {
        let option = {};

        if (type === 'stock') {
            option = {
                tooltip: { trigger: 'item', formatter: '{b}: <br/>{c} Volume ({d}%)' },
                legend: { bottom: '5%', left: 'center' },
                series: [{
                    type: 'pie',
                    radius: ['40%', '70%'], // 环形图更具商务感
                    data: data.map(item => ({ name: item.stock_index, value: item.total_volume })),
                    itemStyle: { borderRadius: 10, borderColor: '#fff', borderWidth: 2 }
                }]
            };
        }
        else if (type === 'macro') {
            option = {
                tooltip: { trigger: 'axis' },
                legend: { data: ['GDP Growth (%)', 'Unemployment Rate (%)'] },
                xAxis: { type: 'category', data: data.map(item => item.year_val) },
                yAxis: [
                    { type: 'value', name: 'GDP (%)', position: 'left' },
                    { type: 'value', name: 'Unemployment (%)', position: 'right' }
                ],
                series: [
                    { name: 'GDP Growth (%)', type: 'bar', data: data.map(item => item.avg_gdp), itemStyle: { color: '#2980b9' } },
                    { name: 'Unemployment Rate (%)', type: 'line', yAxisIndex: 1, data: data.map(item => item.avg_unemployment), smooth: true, lineStyle: { width: 4, color: '#e74c3c' } }
                ]
            };
        }
        else if (type === 'confidence') {
            // 过滤掉 null 或无效数据
            const validData = data.filter(item => item.confidence_bracket !== null && item.avg_spending !== null);
            option = {
                tooltip: {
                    trigger: 'axis',
                    formatter: function (param) {
                        return `信心指数区间：${param.name}<br/>` +
                               `平均消费支出：${param.value.toFixed(2)} Billion USD`;
                    }
                },
                xAxis: {
                    type: 'category',
                    data: validData.map(item => item.confidence_bracket + 's'),
                    name: 'Consumer Confidence Bracket',
                    nameLocation: 'middle',
                    nameGap: 25,
                    axisLabel: {
                        fontSize: 12,
                        fontWeight: 'bold'
                    }
                },
                yAxis: {
                    type: 'value',
                    name: 'Consumer Spending (Billion USD)',
                    nameLocation: 'middle',
                    nameGap: 40,
                    axisLabel: {
                        fontSize: 12,
                        fontWeight: 'bold'
                    }
                },
                series: [{
                    type: 'line',
                    smooth: true,
                    data: validData.map(item => item.avg_spending),
                    lineStyle: { width: 4, color: '#27ae60' },
                    areaStyle: { color: 'rgba(39, 174, 96, 0.2)' },
                    symbol: 'circle',
                    symbolSize: 8,
                    itemStyle: {
                        color: '#27ae60'
                    }
                }]
            };
        }

        else if (type === 'commodity') {
            option = {
                tooltip: { trigger: 'axis' },
                legend: { data: ['Crude Oil (USD/bbl)', 'Gold (USD/oz)'] },
                xAxis: { type: 'category', data: data.map(item => item.year_val) },
                yAxis: [
                    { type: 'value', name: 'Crude Oil', position: 'left' },
                    { type: 'value', name: 'Gold', position: 'right' }
                ],
                series: [
                    { name: 'Crude Oil (USD/bbl)', type: 'line', data: data.map(item => item.avg_oil), smooth: true, lineStyle: { width: 3, color: '#34495e' } },
                    { name: 'Gold (USD/oz)', type: 'line', yAxisIndex: 1, data: data.map(item => item.avg_gold), smooth: true, lineStyle: { width: 3, color: '#f39c12' } }
                ]
            };
        }

        else if (type === 'interestgdp') {
            option = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'cross' }
                },
                legend: { data: ['Interest Rate (%)', 'GDP Growth (%)'] },
                xAxis: {
                    type: 'category',
                    data: data.map(item => item.year_val),
                    name: 'Year'
                },
                yAxis: [
                    {
                        type: 'value',
                        name: 'Interest Rate (%)',
                        position: 'left',
                        axisLabel: { formatter: '{value}%' },
                        splitLine: { show: true, lineStyle: { type: 'dashed' } }
                    },
                    {
                        type: 'value',
                        name: 'GDP Growth (%)',
                        position: 'right',
                        axisLabel: { formatter: '{value}%' },
                        splitLine: { show: false }
                    }
                ],
                series: [
                    {
                        name: 'Interest Rate (%)',
                        type: 'line',
                        data: data.map(item => item.avg_interest),
                        smooth: true,
                        lineStyle: { width: 4, color: '#e74c3c' },
                        itemStyle: { color: '#e74c3c' },
                        symbol: 'circle',
                        symbolSize: 8
                    },
                    {
                        name: 'GDP Growth (%)',
                        type: 'line',
                        yAxisIndex: 1,
                        data: data.map(item => item.avg_gdp),
                        smooth: true,
                        lineStyle: { width: 4, color: '#2980b9' },
                        itemStyle: { color: '#2980b9' },
                        symbol: 'circle',
                        symbolSize: 8
                    }
                ]
            };
        }

        else if (type === 'phillips') {
            // 准备散点图数据
            const scatterData = data.map(item => [
                parseFloat(item.avg_unemployment),
                parseFloat(item.avg_inflation),
                item.year_val
            ]);

            // 计算线性回归趋势线
            const trendLine = calculateTrendLine(scatterData);

            option = {
                tooltip: {
                    trigger: 'item',
                    formatter: function (param) {
                        return `年份：${param.data[2]}<br/>` +
                            `失业率：${param.data[0].toFixed(2)}%<br/>` +
                            `通胀率：${param.data[1].toFixed(2)}%`;
                    }
                },
                title: {
                    text: '',
                    left: 'center'
                },
                legend: {
                    data: ['Annual Data', 'Linear Trend'],
                    bottom: 10
                },
                xAxis: {
                    type: 'value',
                    name: 'Unemployment Rate (%)',
                    nameLocation: 'middle',
                    nameGap: 30,
                    scale: true,
                    minOnZero: false,
                    splitLine: { show: true, lineStyle: { type: 'dashed' } },
                    axisLabel: { formatter: '{value}%' }
                },
                yAxis: {
                    type: 'value',
                    name: 'Inflation Rate (%)',
                    nameLocation: 'middle',
                    nameGap: 40,
                    scale: true,
                    minOnZero: false,
                    splitLine: { show: true, lineStyle: { type: 'dashed' } },
                    axisLabel: { formatter: '{value}%' }
                },
                grid: {
                    left: '12%',
                    right: '12%',
                    top: '15%',
                    bottom: '15%'
                },
                series: [
                    {
                        name: 'Annual Data',
                        type: 'scatter',
                        data: scatterData,
                        symbolSize: 14,
                        itemStyle: {
                            color: '#2980b9',
                            shadowBlur: 10,
                            shadowColor: 'rgba(41, 128, 185, 0.5)'
                        },
                        label: {
                            show: true,
                            formatter: function (param) {
                                return param.data[2];
                            },
                            position: 'top',
                            fontSize: 11,
                            color: '#7f8c8d'
                        },
                        emphasis: {
                            focus: 'series',
                            itemStyle: {
                                color: '#e74c3c',
                                shadowBlur: 15,
                                shadowColor: 'rgba(231, 76, 60, 0.8)'
                            },
                            label: {
                                color: '#e74c3c',
                                fontWeight: 'bold'
                            }
                        }
                    },
                    {
                        name: 'Linear Trend',
                        type: 'line',
                        data: trendLine,
                        smooth: false,
                        symbol: 'none',
                        lineStyle: {
                            color: '#e74c3c',
                            width: 3,
                            type: 'solid'
                        },
                        emphasis: {
                            lineStyle: {
                                width: 5
                            }
                        }
                    }
                ]
            };
        }

        else if (type === 'performance') {
            // 按年份分组数据
            const yearData = {};
            data.forEach(item => {
                const year = item.year_val;
                if (!yearData[year]) {
                    yearData[year] = [];
                }
                yearData[year].push({
                    index: item.stock_index,
                    change: parseFloat(item.change_percent)
                });
            });

            const years = Object.keys(yearData).sort();

            option = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'shadow' },
                    formatter: function (param) {
                        let result = `<strong>${param.name}年</strong><br/>`;
                        param.forEach(p => {
                            const color = p.value >= 0 ? '#e74c3c' : '#2980b9';
                            result += `<span style="color:${color}">● ${p.seriesName}: ${p.value.toFixed(2)}%</span><br/>`;
                        });
                        return result;
                    }
                },
                legend: {
                    data: ['道琼斯工业指数', '标普 500 指数', '纳斯达克指数'],
                    bottom: 10
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '10%',
                    top: '15%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: years,
                    name: '年份',
                    axisLine: { lineStyle: { width: 2, color: '#2c3e50' } },
                    axisLabel: { fontSize: 12, fontWeight: 'bold' }
                },
                yAxis: {
                    type: 'value',
                    name: '涨跌幅 (%)',
                    axisLabel: {
                        formatter: '{value}%',
                        fontSize: 12,
                        fontWeight: 'bold'
                    },
                    splitLine: {
                        lineStyle: {
                            type: 'dashed',
                            color: '#bdc3c7'
                        }
                    },
                    axisLine: { lineStyle: { width: 2, color: '#2c3e50' } }
                },
                series: [
                    {
                        name: '道琼斯工业指数',
                        type: 'bar',
                        barWidth: '30%',
                        data: years.map(year => {
                            const dj = yearData[year].find(d => d.index.includes('Dow'));
                            return dj ? dj.change : 0;
                        }),
                        itemStyle: {
                            color: function(params) {
                                return params.value >= 0 ? '#e74c3c' : '#3498db';
                            },
                            borderRadius: [6, 6, 0, 0]
                        },
                        emphasis: {
                            itemStyle: {
                                shadowBlur: 10,
                                shadowColor: 'rgba(0, 0, 0, 0.3)'
                            }
                        }
                    },
                    {
                        name: '标普 500 指数',
                        type: 'bar',
                        barWidth: '30%',
                        data: years.map(year => {
                            const sp = yearData[year].find(d => d.index.includes('S&P'));
                            return sp ? sp.change : 0;
                        }),
                        itemStyle: {
                            color: function(params) {
                                return params.value >= 0 ? '#e67e22' : '#9b59b6';
                            },
                            borderRadius: [6, 6, 0, 0]
                        },
                        emphasis: {
                            itemStyle: {
                                shadowBlur: 10,
                                shadowColor: 'rgba(0, 0, 0, 0.3)'
                            }
                        }
                    },
                    {
                        name: '纳斯达克指数',
                        type: 'bar',
                        barWidth: '30%',
                        data: years.map(year => {
                            const nas = yearData[year].find(d => d.index.includes('NASDAQ'));
                            return nas ? nas.change : 0;
                        }),
                        itemStyle: {
                            color: function(params) {
                                return params.value >= 0 ? '#2ecc71' : '#1abc9c';
                            },
                            borderRadius: [6, 6, 0, 0]
                        },
                        emphasis: {
                            itemStyle: {
                                shadowBlur: 10,
                                shadowColor: 'rgba(0, 0, 0, 0.3)'
                            }
                        }
                    }
                ]
            };
        }

        else if (type === 'mainvestment') {
            option = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: {
                        type: 'cross',
                        crossStyle: {
                            color: '#999'
                        }
                    }
                },
                legend: {
                    data: ['MA Deals Count', 'VC Funding (Billion USD)', 'Bankruptcy Rate (%)'],
                    bottom: 10
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '10%',
                    top: '15%',
                    containLabel: true
                },
                xAxis: [
                    {
                        type: 'category',
                        data: data.map(item => item.year_val),
                        name: 'Year',
                        axisPointer: {
                            type: 'shadow'
                        },
                        axisLine: { lineStyle: { width: 2, color: '#2c3e50' } },
                        axisLabel: { fontSize: 12, fontWeight: 'bold' }
                    }
                ],
                yAxis: [
                    {
                        type: 'value',
                        name: 'MA Deals',
                        position: 'left',
                        axisLine: {
                            show: true,
                            lineStyle: { color: '#2980b9' }
                        },
                        axisLabel: {
                            formatter: '{value}',
                            fontSize: 11,
                            color: '#2980b9'
                        },
                        splitLine: { show: false }
                    },
                    {
                        type: 'value',
                        name: 'VC Funding (Billion USD)',
                        position: 'right',
                        axisLine: {
                            show: true,
                            lineStyle: { color: '#27ae60' }
                        },
                        axisLabel: {
                            formatter: '{value}',
                            fontSize: 11,
                            color: '#27ae60'
                        },
                        splitLine: { show: false }
                    },
                    {
                        type: 'value',
                        name: 'Bankruptcy Rate (%)',
                        position: 'right',
                        offset: 80,
                        axisLine: {
                            show: true,
                            lineStyle: { color: '#e74c3c' }
                        },
                        axisLabel: {
                            formatter: '{value}%',
                            fontSize: 11,
                            color: '#e74c3c'
                        },
                        splitLine: { show: false }
                    }
                ],
                series: [
                    {
                        name: 'MA Deals Count',
                        type: 'bar',
                        barWidth: '40%',
                        data: data.map(item => item.total_ma_deals),
                        itemStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: '#3498db' },
                                { offset: 1, color: '#2980b9' }
                            ]),
                            borderRadius: [6, 6, 0, 0]
                        },
                        emphasis: {
                            itemStyle: {
                                shadowBlur: 10,
                                shadowColor: 'rgba(0, 0, 0, 0.3)'
                            }
                        }
                    },
                    {
                        name: 'VC Funding (Billion USD)',
                        type: 'line',
                        yAxisIndex: 1,
                        data: data.map(item => parseFloat(item.total_vc_funding)),
                        smooth: true,
                        lineStyle: { width: 4, color: '#27ae60' },
                        itemStyle: { color: '#27ae60' },
                        symbol: 'circle',
                        symbolSize: 8,
                        areaStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: 'rgba(39, 174, 96, 0.3)' },
                                { offset: 1, color: 'rgba(39, 174, 96, 0.05)' }
                            ])
                        }
                    },
                    {
                        name: 'Bankruptcy Rate (%)',
                        type: 'line',
                        yAxisIndex: 2,
                        data: data.map(item => parseFloat(item.avg_bankruptcy)),
                        smooth: true,
                        lineStyle: { width: 4, color: '#e74c3c', type: 'dashed' },
                        itemStyle: { color: '#e74c3c' },
                        symbol: 'rect',
                        symbolSize: 8
                    }
                ]
            };
        }

        else if (type === 'realestate') {
            option = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'cross' }
                },
                legend: { data: ['Real Estate Index', 'Interest Rate (%)'] },
                xAxis: {
                    type: 'category',
                    data: data.map(item => item.year_val),
                    name: 'Year'
                },
                yAxis: [
                    {
                        type: 'value',
                        name: 'Real Estate Index',
                        position: 'left',
                        axisLabel: { formatter: '{value}' },
                        splitLine: { show: true, lineStyle: { type: 'dashed' } }
                    },
                    {
                        type: 'value',
                        name: 'Interest Rate (%)',
                        position: 'right',
                        axisLabel: { formatter: '{value}%' },
                        splitLine: { show: false }
                    }
                ],
                series: [
                    {
                        name: 'Real Estate Index',
                        type: 'bar',
                        data: data.map(item => item.avg_real_estate),
                        itemStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [

        else if (type === 'oilinflation') {

        return option;
    }

    // 最小二乘法计算线性回归趋势线
    function calculateTrendLine(data) {
        const n = data.length;
        if (n < 2) return [];

        let sumX = 0, sumY = 0, sumXY = 0, sumXX = 0;

        data.forEach(point => {
            const x = point[0];
            const y = point[1];
            sumX += x;
            sumY += y;
            sumXY += x * y;
            sumXX += x * x;
        });

        // 计算斜率和截距
        const slope = (n * sumXY - sumX * sumY) / (n * sumXX - sumX * sumX);
        const intercept = (sumY - slope * sumX) / n;

        // 生成趋势线的两个端点
        const xValues = data.map(p => p[0]);
        const minX = Math.min(...xValues);
        const maxX = Math.max(...xValues);

        return [
            [minX, slope * minX + intercept],
            [maxX, slope * maxX + intercept]
        ];
    }
